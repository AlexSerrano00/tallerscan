<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TallerScan — Visor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08080f;
    --surface: #10101a;
    --card: #14141f;
    --border: #222230;
    --accent: #c8f03d;
    --accent2: #3de0f0;
    --text: #f0f0f8;
    --muted: #6a6a82;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --char-accent: #c8f03d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-body); font-size: 15px;
    display: flex; flex-direction: column;
  }

  /* TOP BAR */
  #topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; background: rgba(16,16,26,0.9);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
    backdrop-filter: blur(10px); position: relative; z-index: 10;
  }
  #topbar .logo { font-family: var(--font-head); font-size: 16px; font-weight: 800; }
  #topbar .logo span { color: var(--accent); }
  #tool-badge {
    font-size: 11px; font-weight: 600; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.8px;
    background: rgba(200,240,61,0.12); border: 1px solid rgba(200,240,61,0.25);
    padding: 3px 10px; border-radius: 20px;
  }
  #repeat-btn {
    background: var(--border); border: none; color: var(--text);
    padding: 7px 14px; border-radius: 8px; cursor: pointer;
    font-family: var(--font-body); font-size: 13px; font-weight: 500;
    display: flex; align-items: center; gap: 6px;
  }
  #repeat-btn:hover { background: #2a2a3e; }

  /* 3D CANVAS */
  #canvas-wrap {
    flex: 1; position: relative; overflow: hidden; background: var(--bg);
    min-height: 0;
  }
  #three-canvas { width: 100%; height: 100%; display: block; }

  /* Grid overlay */
  #canvas-wrap::before {
    content:''; position:absolute; inset:0; pointer-events:none;
    background-image: linear-gradient(rgba(34,34,48,0.4) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,34,48,0.4) 1px, transparent 1px);
    background-size: 50px 50px; z-index:1;
  }

  /* Vignette */
  #canvas-wrap::after {
    content:''; position:absolute; inset:0; pointer-events:none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(8,8,15,0.8) 100%);
    z-index:2;
  }

  /* TOOL TITLE floating */
  #tool-title-float {
    position:absolute; top: 16px; left: 16px; z-index:5;
    font-family: var(--font-head); font-size: 22px; font-weight: 800;
    color: var(--text); text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    pointer-events: none;
  }
  #tool-cat-float {
    position:absolute; top: 46px; left: 16px; z-index:5;
    font-size: 12px; font-weight: 600; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.8px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8); pointer-events:none;
  }

  /* ROTATE HINT */
  #rotate-hint {
    position:absolute; bottom: 12px; left: 50%; transform: translateX(-50%); z-index:5;
    font-size: 12px; color: rgba(255,255,255,0.35); pointer-events:none;
    background: rgba(0,0,0,0.4); padding: 4px 12px; border-radius: 20px;
  }

  /* CHARACTER */
  #char-wrap {
    position: absolute; bottom: 0; right: 0; z-index: 10;
    width: 140px; height: 240px; pointer-events: none;
  }
  #char-canvas { width: 140px; height: 240px; }

  /* SPEECH BUBBLE */
  #speech-wrap {
    flex-shrink: 0; background: var(--surface);
    border-top: 1px solid var(--border); padding: 14px 16px;
    position: relative; z-index: 10; min-height: 80px; max-height: 160px;
    overflow-y: auto;
  }
  #speech-inner {
    display: flex; gap: 10px; align-items: flex-start;
  }
  #speech-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; margin-top: 2px;
  }
  #speech-text {
    flex: 1; font-size: 14px; line-height: 1.65; color: var(--text);
    font-family: var(--font-body);
  }
  #typing-cursor {
    display: inline-block; width: 2px; height: 14px;
    background: var(--accent); margin-left: 2px;
    vertical-align: middle; animation: blink 0.6s step-end infinite;
  }
  @keyframes blink { 50% { opacity:0; } }

  /* PROGRESS BAR */
  #voice-progress {
    position: absolute; top: 0; left: 0; height: 2px;
    background: var(--accent); width: 0%; transition: width 0.3s linear;
    border-radius: 0 2px 2px 0;
  }

  /* LOADING */
  #loading {
    position: absolute; inset:0; background: var(--bg);
    display: flex; flex-direction:column; align-items:center; justify-content:center;
    z-index: 100;
  }
  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--muted); font-size: 14px; }

  /* ERROR STATE */
  #error-state {
    display: none; position: absolute; inset:0;
    align-items:center; justify-content:center; flex-direction:column;
    gap: 12px; color: var(--muted); z-index: 99;
  }
  #error-state.show { display: flex; }
  #error-state .err-icon { font-size: 48px; }
  #error-state h2 { font-family: var(--font-head); color: var(--text); }

  /* NO MODEL fallback tag */
  #model-fallback-tag {
    position:absolute; top:16px; right:16px; z-index:5;
    font-size:11px; color: var(--muted);
    background: rgba(0,0,0,0.5); padding: 3px 8px; border-radius: 20px;
    display:none;
  }
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">Taller<span>Scan</span></div>
  <div id="tool-badge">Cargando...</div>
  <button id="repeat-btn" onclick="repeatSpeech()">🔊 Repetir</button>
</div>

<div id="canvas-wrap">
  <canvas id="three-canvas"></canvas>
  <div id="tool-title-float"></div>
  <div id="tool-cat-float"></div>
  <div id="rotate-hint">Arrastra para rotar</div>
  <div id="model-fallback-tag">Modelo procedural</div>
  <div id="char-wrap"><canvas id="char-canvas" width="140" height="240"></canvas></div>

  <div id="loading"><div class="spinner"></div><p>Cargando herramienta...</p></div>
  <div id="error-state">
    <div class="err-icon">🔍</div>
    <h2>Máquina no encontrada</h2>
    <p>Escanea un código QR válido del salón</p>
  </div>
</div>

<div id="speech-wrap">
  <div id="voice-progress"></div>
  <div id="speech-inner">
    <div id="speech-avatar">🤖</div>
    <div id="speech-text"><span id="text-out"></span><span id="typing-cursor"></span></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── PARAMS ──────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const machineId = params.get('id');
const isPreview = params.get('preview') === '1';

// ─── THREE.JS ────────────────────────────────────────────────────────
let scene, camera, renderer, toolGroup, animId;
let isDragging = false, prevMouse = {x:0,y:0};
let threeInitialized = false;
let gltfLoaderReady = false;
let gltfLoaderPromise = null;

function initThree() {
  if(threeInitialized) return;
  threeInitialized = true;
  const canvas = document.getElementById('three-canvas');
  const wrap = document.getElementById('canvas-wrap');
  renderer = new THREE.WebGLRenderer({canvas, antialias: true, alpha: false});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  resizeRenderer();

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x08080f);
  scene.fog = new THREE.FogExp2(0x08080f, 0.06);

  camera = new THREE.PerspectiveCamera(45, wrap.clientWidth / wrap.clientHeight, 0.1, 200);
  camera.position.set(0, 1.8, 5.5);
  camera.lookAt(0, 0.5, 0);

  const ambient = new THREE.AmbientLight(0xffffff, 0.35);
  scene.add(ambient);

  const dir1 = new THREE.DirectionalLight(0xffffff, 0.9);
  dir1.position.set(4, 6, 4); dir1.castShadow = true;
  scene.add(dir1);

  const dir2 = new THREE.DirectionalLight(0x3de0f0, 0.3);
  dir2.position.set(-4, 2, -3);
  scene.add(dir2);

  const accentLight = new THREE.PointLight(0xc8f03d, 0.5, 10);
  accentLight.position.set(0, 3, 2);
  scene.add(accentLight);

  const grid = new THREE.GridHelper(20, 30, 0x1a1a28, 0x111120);
  scene.add(grid);

  // Touch/mouse rotate
  canvas.addEventListener('mousedown', e=>{isDragging=true;prevMouse={x:e.clientX,y:e.clientY};});
  window.addEventListener('mouseup', ()=>isDragging=false);
  window.addEventListener('mousemove', e=>{
    if(!isDragging||!toolGroup) return;
    toolGroup.rotation.y += (e.clientX-prevMouse.x)*0.012;
    prevMouse={x:e.clientX,y:e.clientY};
  });
  canvas.addEventListener('touchstart', e=>{isDragging=true;prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
  window.addEventListener('touchend', ()=>isDragging=false);
  window.addEventListener('touchmove', e=>{
    if(!isDragging||!toolGroup) return;
    toolGroup.rotation.y += (e.touches[0].clientX-prevMouse.x)*0.012;
    prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};
  },{passive:true});

  window.addEventListener('resize', resizeRenderer);
  render3D();
}

function resizeRenderer() {
  const wrap = document.getElementById('canvas-wrap');
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  if(camera) { camera.aspect = w/h; camera.updateProjectionMatrix(); }
}

function render3D() {
  animId = requestAnimationFrame(render3D);
  if(toolGroup && !isDragging) toolGroup.rotation.y += 0.004;
  renderer.render(scene, camera);
}

// ─── PROCEDURAL 3D MODELS ────────────────────────────────────────────
function box3(w,h,d,color,x,y,z) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshLambertMaterial({color}));
  m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; return m;
}
function cyl3(rt,rb,h,s,color,x,y,z,rx,ry,rz) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,s), new THREE.MeshLambertMaterial({color}));
  m.position.set(x,y,z);
  if(rx!==undefined) m.rotation.set(rx,ry||0,rz||0);
  m.castShadow=true; return m;
}

const proceduralBuilders = {
  default(g,c) {
    // Generic tool box
    g.add(box3(1.5,0.15,1,0x445566,0,0,0));
    g.add(box3(0.2,1.5,0.2,0x667788,0,0.8,0));
    g.add(cyl3(0.3,0.3,0.5,16,c,0,1.8,0));
    g.add(cyl3(0.08,0.08,0.6,8,0xaaaacc,0,2.2,0));
  }
};

function buildProceduralModel(type, accentColor) {
  const g = new THREE.Group();
  const c = new THREE.Color(accentColor||'#c8f03d');
  const ch = c.getHex();
  const dark = new THREE.Color(accentColor||'#c8f03d').multiplyScalar(0.5).getHex();

  if(type==='drill'||!type) {
    g.add(box3(1.3,0.12,0.9,0x445566,0,-0.06,0));
    g.add(box3(0.16,2,0.16,0x7788aa,0,1,0));
    g.add(box3(0.9,0.09,0.55,dark,0,2,0));
    g.add(cyl3(0.28,0.28,0.45,16,ch,0,2.3,0));
    g.add(cyl3(0.2,0.2,0.32,16,0x333355,0,2.6,0));
    g.add(cyl3(0.04,0.04,0.55,8,0xddddee,0,2.9,0));
    g.add(box3(0.35,0.09,0.32,0x556677,0,1.6,0));
  } else if(type==='saw') {
    g.add(box3(2,0.09,1.1,0x445566,0,0,0));
    g.add(box3(1.8,0.05,0.7,0x667788,0,0.08,0));
    const blade = new THREE.Mesh(new THREE.CircleGeometry(0.5,48), new THREE.MeshLambertMaterial({color:0xccccdd,side:THREE.DoubleSide}));
    blade.rotation.y=Math.PI/2; blade.position.set(0,0.5,0); g.add(blade);
    g.add(cyl3(0.28,0.28,0.55,16,ch,0,0.5,0.45,Math.PI/2,0,0));
    g.add(box3(0.35,0.55,0.22,dark,0.65,0.32,0.38));
  } else if(type==='lathe') {
    g.add(box3(2.2,0.13,0.75,0x445566,0,0,0));
    g.add(box3(0.4,0.55,0.55,dark,-0.85,0.33,0));
    g.add(cyl3(0.2,0.2,0.09,16,0x888899,-0.85,0.62,0,0,0,Math.PI/2));
    g.add(box3(0.32,0.5,0.5,0x55667a,0.85,0.3,0));
    g.add(cyl3(0.07,0.07,0.55,8,0xaaaacc,0.85,0.6,0,0,0,Math.PI/2));
    g.add(cyl3(0.09,0.09,0.85,16,ch,0,0.38,0,0,0,Math.PI/2));
  } else if(type==='welder') {
    g.add(box3(0.75,1.1,0.55,dark,0,0.55,0));
    g.add(box3(0.7,0.09,0.5,ch,0,1.15,0));
    const hose = new THREE.Mesh(new THREE.TorusGeometry(0.32,0.045,8,24,Math.PI*1.1), new THREE.MeshLambertMaterial({color:0x333344}));
    hose.position.set(0.22,0.85,-0.12); hose.rotation.z=Math.PI/4; g.add(hose);
    g.add(cyl3(0.028,0.028,0.75,8,0x555566,0.58,0.82,-0.12,0,0,-0.42));
    g.add(cyl3(0.032,0.016,0.28,8,0x8888aa,0.9,0.56,-0.12,0,0,-0.42));
    g.add(box3(0.13,0.13,0.22,ch,0,1.12,0.32));
    g.add(cyl3(0.28,0.28,0.17,16,0x333344,0,0,0));
  } else {
    proceduralBuilders.default(g, ch);
  }
  return g;
}

// ─── GLB LOADER ──────────────────────────────────────────────────────
function ensureGLTFLoader() {
  if(gltfLoaderReady) return Promise.resolve();
  if(gltfLoaderPromise) return gltfLoaderPromise;
  gltfLoaderPromise = new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
    script.onload = () => { gltfLoaderReady = true; resolve(); };
    script.onerror = reject;
    document.head.appendChild(script);
  });
  return gltfLoaderPromise;
}

function clearToolGroup() {
  if(!toolGroup) return;
  scene.remove(toolGroup);
  toolGroup.traverse(obj => {
    if(obj.isMesh) {
      if(obj.geometry) obj.geometry.dispose();
      if(obj.material) {
        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        mats.forEach(mat => {
          Object.values(mat).forEach(val => { if(val && val.isTexture) val.dispose(); });
          mat.dispose();
        });
      }
    }
  });
  toolGroup = null;
}

function scaleGLTF(gltfScene) {
  const box = new THREE.Box3().setFromObject(gltfScene);
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = 2.5 / (maxDim || 1);
  gltfScene.scale.setScalar(scale);
  const center = box.getCenter(new THREE.Vector3());
  gltfScene.position.sub(center.multiplyScalar(scale));
  gltfScene.position.y += 0.5;
  return gltfScene;
}

function loadGLB(source) {
  return ensureGLTFLoader().then(() => new Promise((resolve, reject) => {
    const loader = new THREE.GLTFLoader();
    // Si es URL https:// cargarlo directamente, si es dataURL convertir a blob
    if(source.startsWith('http') || source.startsWith('blob')) {
      loader.load(source, gltf => { resolve(scaleGLTF(gltf.scene)); }, undefined, reject);
    } else {
      // dataURL base64
      const byteStr = atob(source.split(',')[1]);
      const ab = new ArrayBuffer(byteStr.length);
      const ia = new Uint8Array(ab);
      for(let i=0;i<byteStr.length;i++) ia[i]=byteStr.charCodeAt(i);
      const blob = new Blob([ab], {type:'model/gltf-binary'});
      const url = URL.createObjectURL(blob);
      loader.load(url, gltf => { URL.revokeObjectURL(url); resolve(scaleGLTF(gltf.scene)); }, undefined, reject);
    }
  }));
}

// ─── ANIMATED CHARACTER ──────────────────────────────────────────────
let charCtx, charTimer = null;
let mouthState = 0, blinkCounter = 0, isTalking = false;
let charFrame = 0;

function initChar() {
  const c = document.getElementById('char-canvas');
  charCtx = c.getContext('2d');
  drawChar();
  setInterval(()=>{
    blinkCounter++;
    charFrame++;
    drawChar();
  }, 100);
}

function drawChar() {
  const ctx = charCtx;
  const W = 140, H = 240;
  ctx.clearRect(0, 0, W, H);

  // ── Sombra en el suelo ──
  ctx.fillStyle = 'rgba(200,240,61,0.10)';
  ctx.beginPath(); ctx.ellipse(70, 228, 32, 9, 0, 0, Math.PI*2); ctx.fill();

  // ── PIERNAS ──
  // Pantalón oscuro con brillo anime
  const legGrad = ctx.createLinearGradient(35,165,85,165);
  legGrad.addColorStop(0,'#1a2535'); legGrad.addColorStop(0.5,'#253348'); legGrad.addColorStop(1,'#1a2535');
  ctx.fillStyle = legGrad;
  ctx.beginPath(); ctx.roundRect(36,162,20,42,4); ctx.fill();
  ctx.beginPath(); ctx.roundRect(64,162,20,42,4); ctx.fill();
  // Brillo en pierna
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.fillRect(40,165,6,30); ctx.fillRect(68,165,6,30);
  // Zapatos con punta redondeada
  const shoeGrad = ctx.createLinearGradient(30,200,90,215);
  shoeGrad.addColorStop(0,'#111'); shoeGrad.addColorStop(1,'#333');
  ctx.fillStyle = shoeGrad;
  ctx.beginPath(); ctx.roundRect(30,198,28,14,[2,8,8,2]); ctx.fill();
  ctx.beginPath(); ctx.roundRect(62,198,28,14,[2,8,8,2]); ctx.fill();
  // Brillo zapatos
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.ellipse(42,202,8,3,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(74,202,8,3,0,0,Math.PI*2); ctx.fill();

  // ── CUERPO — Camiseta SENA verde con gradiente ──
  const bodyGrad = ctx.createLinearGradient(22,100,110,165);
  bodyGrad.addColorStop(0,'#4ec900'); bodyGrad.addColorStop(0.5,'#39A900'); bodyGrad.addColorStop(1,'#2a7d00');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath(); ctx.roundRect(24,102,92,66,10); ctx.fill();
  // Brillo camiseta (reflejo anime)
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath(); ctx.roundRect(30,106,38,20,6); ctx.fill();

  // ── LOGO SENA en la camiseta ──
  ctx.save();
  ctx.translate(70, 132);
  // Cabeza del logo (círculo negro)
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(0,-20,5.5,0,Math.PI*2); ctx.fill();
  // Texto SENA
  ctx.fillStyle = '#000';
  ctx.font = 'bold 10px Arial Black, Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('SENA', 0, -8);
  // Figura humana — brazos horizontales + piernas en V
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3; ctx.lineCap = 'square'; ctx.lineJoin = 'miter';
  ctx.beginPath(); ctx.moveTo(-2,1); ctx.lineTo(-16,1); ctx.stroke(); // brazo izq
  ctx.beginPath(); ctx.moveTo(2,1); ctx.lineTo(16,1); ctx.stroke();  // brazo der
  ctx.beginPath(); ctx.moveTo(0,1); ctx.lineTo(-11,16); ctx.stroke(); // pierna izq
  ctx.beginPath(); ctx.moveTo(0,1); ctx.lineTo(11,16); ctx.stroke();  // pierna der
  ctx.restore();

  // Franja amarilla SENA en la cintura
  ctx.fillStyle = '#FFD100';
  ctx.fillRect(24,162,92,5);

  // ── BRAZOS estilo anime ──
  // Brazo izquierdo
  const armGrad = ctx.createLinearGradient(0,108,24,108);
  armGrad.addColorStop(0,'#2a7d00'); armGrad.addColorStop(1,'#39A900');
  ctx.fillStyle = armGrad;
  ctx.beginPath(); ctx.roundRect(4,108,22,52,8); ctx.fill();
  // Brazo derecho
  const armGrad2 = ctx.createLinearGradient(116,108,140,108);
  armGrad2.addColorStop(0,'#39A900'); armGrad2.addColorStop(1,'#2a7d00');
  ctx.fillStyle = armGrad2;
  ctx.beginPath(); ctx.roundRect(114,108,22,52,8); ctx.fill();
  // Franja amarilla en muñecas
  ctx.fillStyle = '#FFD100';
  ctx.fillRect(4,148,22,5); ctx.fillRect(114,148,22,5);
  // Manos (color piel)
  const skinColor = '#f5c8a0';
  ctx.fillStyle = skinColor;
  ctx.beginPath(); ctx.arc(15,164,11,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(125,164,11,0,Math.PI*2); ctx.fill();
  // Brillo en manos
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath(); ctx.arc(12,160,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(122,160,4,0,Math.PI*2); ctx.fill();

  // ── CUELLO ──
  ctx.fillStyle = skinColor;
  ctx.beginPath(); ctx.roundRect(57,82,26,24,4); ctx.fill();

  // ── CABEZA — estilo anime: ojos grandes, proporciones exageradas ──
  // Sombra cabeza
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.roundRect(21,22,100,82,20); ctx.fill();
  // Cara base
  const faceGrad = ctx.createRadialGradient(72,55,10,72,55,52);
  faceGrad.addColorStop(0,'#fde8c8'); faceGrad.addColorStop(1,'#f5c8a0');
  ctx.fillStyle = faceGrad;
  ctx.beginPath(); ctx.roundRect(22,20,96,82,20); ctx.fill();

  // ── PELO — estilo anime con mechones ──
  ctx.fillStyle = '#1a0f00';
  // Base pelo
  ctx.beginPath(); ctx.roundRect(20,16,100,46,[20,20,0,0]); ctx.fill();
  // Mechones laterales
  ctx.beginPath(); ctx.moveTo(22,40); ctx.lineTo(14,72); ctx.lineTo(26,58); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(118,40); ctx.lineTo(126,72); ctx.lineTo(114,58); ctx.closePath(); ctx.fill();
  // Mechón frontal (flequillo anime)
  ctx.fillStyle = '#251500';
  ctx.beginPath(); ctx.moveTo(38,24); ctx.lineTo(44,50); ctx.lineTo(54,32); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(56,20); ctx.lineTo(60,48); ctx.lineTo(72,26); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(74,20); ctx.lineTo(82,46); ctx.lineTo(92,28); ctx.closePath(); ctx.fill();
  // Brillo en el pelo (toque anime)
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath(); ctx.ellipse(60,26,18,6,(-0.3),0,Math.PI*2); ctx.fill();

  // ── OJOS ANIME — grandes, expresivos ──
  const blinkNow = blinkCounter % 40 < 3;
  if(blinkNow) {
    // Ojos cerrados (línea curva)
    ctx.strokeStyle = '#1a0a00'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(52,62,10,Math.PI+0.2,-0.2); ctx.stroke();
    ctx.beginPath(); ctx.arc(88,62,10,Math.PI+0.2,-0.2); ctx.stroke();
  } else {
    // Blanco del ojo — grande y expresivo
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(52,63,13,14,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(88,63,13,14,0,0,Math.PI*2); ctx.fill();
    // Iris grande (color azul-verde anime)
    ctx.fillStyle = '#1a6aaa';
    ctx.beginPath(); ctx.ellipse(52,64,10,11,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(88,64,10,11,0,0,Math.PI*2); ctx.fill();
    // Pupila
    ctx.fillStyle = '#050510';
    ctx.beginPath(); ctx.ellipse(52,65,6,7,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(88,65,6,7,0,0,Math.PI*2); ctx.fill();
    // Brillo principal ojo (punto blanco grande — sello anime)
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(47,59,4,4,(-0.5),0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(83,59,4,4,(-0.5),0,Math.PI*2); ctx.fill();
    // Brillo secundario pequeño
    ctx.beginPath(); ctx.arc(56,68,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(92,68,2,0,Math.PI*2); ctx.fill();
    // Rim light (borde claro abajo del iris)
    ctx.fillStyle = 'rgba(100,180,255,0.4)';
    ctx.beginPath(); ctx.ellipse(52,70,7,4,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(88,70,7,4,0,0,Math.PI*2); ctx.fill();
    // Cejas expresivas estilo anime
    ctx.fillStyle = '#1a0f00';
    ctx.beginPath(); ctx.roundRect(40,46,24,5,3); ctx.fill();
    ctx.beginPath(); ctx.roundRect(76,46,24,5,3); ctx.fill();
    // Ligera inclinación en cejas
    ctx.fillStyle = '#1a0f00';
    ctx.save(); ctx.translate(40,46); ctx.rotate(-0.1);
    ctx.fillRect(0,0,24,4); ctx.restore();
    ctx.save(); ctx.translate(76,46); ctx.rotate(0.1);
    ctx.fillRect(0,0,24,4); ctx.restore();
  }

  // ── NARIZ pequeña ──
  ctx.strokeStyle = '#c8a080'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(68,75); ctx.lineTo(72,75); ctx.stroke();

  // ── BOCA anime ──
  ctx.strokeStyle = '#c06040'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  if(isTalking) {
    const m = mouthState % 4;
    if(m===0||m===2) {
      // Boca abierta anime (óvalo)
      ctx.fillStyle = '#8b1a1a';
      ctx.beginPath(); ctx.ellipse(70,86,10,7,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#f08080';
      ctx.beginPath(); ctx.ellipse(70,85,7,4,0,0,Math.PI*2); ctx.fill();
      // Dientecitos
      ctx.fillStyle = '#fff';
      ctx.fillRect(64,82,5,4); ctx.fillRect(71,82,5,4);
    } else {
      // Sonrisa amplia
      ctx.beginPath(); ctx.arc(70,82,10,0.1,Math.PI-0.1); ctx.stroke();
      // Cachetes sonrojados anime
      ctx.fillStyle = 'rgba(255,100,100,0.25)';
      ctx.beginPath(); ctx.ellipse(40,76,10,6,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(100,76,10,6,0,0,Math.PI*2); ctx.fill();
    }
  } else {
    // Sonrisa suave
    ctx.beginPath(); ctx.arc(70,83,8,0.15,Math.PI-0.15); ctx.stroke();
    // Cachetes siempre visibles (toque kawaii)
    ctx.fillStyle = 'rgba(255,120,120,0.18)';
    ctx.beginPath(); ctx.ellipse(40,76,10,6,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(100,76,10,6,0,0,Math.PI*2); ctx.fill();
  }

  // ── CASCO/ACCESORIO — banda en el pelo estilo anime ──
  ctx.strokeStyle = '#c8f03d'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(70,34,36,Math.PI+0.35,-0.35); ctx.stroke();
  // Cristal/gema en la banda
  ctx.fillStyle = '#c8f03d';
  ctx.beginPath(); ctx.arc(70,12,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.arc(68,10,2.5,0,Math.PI*2); ctx.fill();
  // Antena
  ctx.strokeStyle = '#c8f03d'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(70,16); ctx.lineTo(70,6); ctx.stroke();
  // Pulso en antena si está hablando
  if(isTalking) {
    ctx.fillStyle = `rgba(200,240,61,${0.3+0.6*Math.abs(Math.sin(charFrame*0.25))})`;
    ctx.beginPath(); ctx.arc(70,6,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#c8f03d';
    ctx.beginPath(); ctx.arc(70,6,5,0,Math.PI*2); ctx.fill();
  }
}

// ─── TEXT-TO-SPEECH ──────────────────────────────────────────────────
let utterance = null;
let currentDesc = '';
let mouthInterval = null;

function doSpeak(text) {
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  if(mouthInterval) clearInterval(mouthInterval);

  utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'es-ES';
  utterance.rate = 0.92;
  utterance.pitch = 1.1;

  const voices = window.speechSynthesis.getVoices();
  const esVoice = voices.find(v=>v.lang.startsWith('es') && v.name.toLowerCase().includes('google'))
    || voices.find(v=>v.lang.startsWith('es'));
  if(esVoice) utterance.voice = esVoice;

  utterance.onstart = () => {
    isTalking = true;
    mouthInterval = setInterval(()=>{ mouthState++; }, 150);
    animateProgress(text.length * 65);
  };
  utterance.onend = () => {
    isTalking = false;
    if(mouthInterval) { clearInterval(mouthInterval); mouthInterval=null; }
    document.getElementById('typing-cursor').style.display='none';
    document.getElementById('voice-progress').style.width='100%';
  };
  utterance.onerror = () => { isTalking = false; };

  window.speechSynthesis.speak(utterance);
  typeText(text);
}

function speak(text) {
  if(!window.speechSynthesis) return;
  // Las voces pueden no estar listas aún — esperar si hace falta
  const voices = window.speechSynthesis.getVoices();
  if(voices.length > 0) {
    doSpeak(text);
  } else {
    // Esperar evento voiceschanged
    window.speechSynthesis.onvoiceschanged = () => {
      window.speechSynthesis.onvoiceschanged = null;
      doSpeak(text);
    };
    // Fallback: intentar igual después de 800ms por si el evento no llega
    setTimeout(() => doSpeak(text), 800);
  }
}

function animateProgress(duration) {
  const bar = document.getElementById('voice-progress');
  bar.style.width = '0%';
  bar.style.transition = `width ${duration}ms linear`;
  setTimeout(()=>bar.style.width='95%', 50);
}

let typingTimer = null;
function typeText(text) {
  const el = document.getElementById('text-out');
  const cur = document.getElementById('typing-cursor');
  cur.style.display = 'inline-block';
  el.textContent = '';
  if(typingTimer) clearInterval(typingTimer);
  let i = 0;
  typingTimer = setInterval(()=>{
    if(i < text.length) { el.textContent += text[i]; i++; }
    else { clearInterval(typingTimer); }
  }, 28);
}

function repeatSpeech() {
  if(currentDesc) speak(currentDesc);
}

// ─── MACHINE LOADING ─────────────────────────────────────────────────
// IndexedDB helpers (espejo del admin)
const DB_NAME = 'tallerscan_db', DB_VER = 1, STORE_NAME = 'glb_store';
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME);
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  });
}
function dbGet(id) {
  return openDB().then(db => new Promise((res, rej) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).get('glb_' + id);
    req.onsuccess = e => res(e.target.result || null);
    req.onerror = e => res(null);
  }));
}

async function getMachineFromStorage(id) {
  // 1. Intentar localStorage primero (mismo PC donde se creó)
  try {
    const raw = localStorage.getItem('tallerscan_meta');
    if(raw) {
      const meta = JSON.parse(raw);
      const m = meta.find(m => m.id === id);
      if(m) {
        if(m.hasGlb) {
          const glb = await dbGet(id).catch(() => null);
          return { ...m, glbData: glb };
        }
        return { ...m, glbData: null };
      }
    }
  } catch(e) {}

  // 2. Si no está en localStorage, buscar en data.json del mismo servidor (celular via GitHub Pages)
  try {
    // Buscar data.json en la misma carpeta que el viewer
    const base = window.location.href.replace(/\/viewer\/index\.html.*$/, '/viewer/data.json');
    const resp = await fetch(base);
    if(resp.ok) {
      const data = await resp.json();
      const m = data.find(m => m.id === id);
      if(m) return { ...m, glbData: null };
    }
  } catch(e) {}

  return null;
}

let loadToken = 0;   // evita que una carga anterior sobreescriba una posterior

async function loadMachine(machine) {
  const myToken = ++loadToken;   // este número identifica ESTA carga
  document.getElementById('loading').style.display='flex';
  document.getElementById('model-fallback-tag').style.display='none';

  // Update UI labels
  document.getElementById('tool-badge').textContent = machine.cat || 'HERRAMIENTA';
  document.getElementById('tool-title-float').textContent = machine.name;
  document.getElementById('tool-cat-float').textContent = machine.cat;
  document.title = machine.name + ' — TallerScan';
  currentDesc = machine.desc;

  // Init Three (solo la primera vez)
  initThree();

  // Limpiar modelo anterior completamente
  clearToolGroup();

  const glbSource = machine.glbUrl || machine.glbData || null;
  if(glbSource) {
    try {
      const obj = await loadGLB(glbSource);
      if(myToken !== loadToken) return;   // llegó otra carga más reciente, descartar
      clearToolGroup();   // limpiar de nuevo por si acaso llegó algo async
      toolGroup = new THREE.Group();
      toolGroup.add(obj);
      scene.add(toolGroup);
    } catch(err) {
      if(myToken !== loadToken) return;
      console.warn('GLB load failed, usando procedural:', err);
      document.getElementById('model-fallback-tag').style.display='block';
      clearToolGroup();
      toolGroup = buildProceduralModel('default', machine.color);
      scene.add(toolGroup);
    }
  } else {
    document.getElementById('model-fallback-tag').style.display='block';
    const cat = (machine.cat||'').toLowerCase();
    let type = 'default';
    if(cat.includes('perfor')||cat.includes('drill')) type='drill';
    else if(cat.includes('cort')||cat.includes('sierra')) type='saw';
    else if(cat.includes('torno')||cat.includes('mecan')) type='lathe';
    else if(cat.includes('sold')) type='welder';
    toolGroup = buildProceduralModel(type, machine.color);
    scene.add(toolGroup);
  }

  if(myToken !== loadToken) return;
  document.getElementById('loading').style.display='none';
  initChar();

  // Hablar automáticamente después de que el modelo cargó
  // Delay suficiente para que las voces estén listas
  setTimeout(()=>{
    speak(machine.desc);
  }, 1200);
}

// ─── INIT ─────────────────────────────────────────────────────────────
function init() {
  // If opened via postMessage (preview from admin)
  window.addEventListener('message', e => {
    if(e.data?.type === 'MACHINE_DATA') {
      loadMachine(e.data.machine);
    }
  });

  if(machineId) {
    if(isPreview && window.parent !== window) {
      // Preview desde admin via postMessage
      document.getElementById('loading').style.display='flex';
      window.parent.postMessage({ type: 'REQUEST_MACHINE', id: machineId }, '*');
    } else {
      // Cargar desde IndexedDB + localStorage (mismo dispositivo)
      getMachineFromStorage(machineId).then(m => {
        if(m) { loadMachine(m); }
        else {
          document.getElementById('loading').style.display='none';
          document.getElementById('error-state').classList.add('show');
        }
      });
    }
  } else if(isPreview) {
    // Wait for postMessage
  } else {
    document.getElementById('loading').style.display='none';
    document.getElementById('error-state').classList.add('show');
  }

  // Wait for voices to load
  if(window.speechSynthesis) window.speechSynthesis.getVoices();
}

init();
