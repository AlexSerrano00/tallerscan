<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TallerScan — Visor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<!-- model-viewer: estándar web para 3D y AR en Android + iPhone -->
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

<style>
  :root {
    --bg:#08080f; --surface:#10101a; --card:#14141f; --border:#222230;
    --accent:#c8f03d; --accent2:#3de0f0; --text:#f0f0f8; --muted:#6a6a82;
    --font-head:'Syne',sans-serif; --font-body:'DM Sans',sans-serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:var(--font-body); }

  /* ── TOPBAR ── */
  #topbar {
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px; background:rgba(8,8,15,0.92);
    border-bottom:1px solid var(--border); backdrop-filter:blur(10px);
    height:52px;
  }
  .logo { font-family:var(--font-head); font-size:18px; font-weight:800; }
  .logo span { color:var(--accent); }
  #tool-badge {
    font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
    background:var(--accent); color:#0e0e13; padding:4px 10px; border-radius:20px;
  }
  #repeat-btn {
    background:var(--surface); border:1px solid var(--border); color:var(--text);
    padding:6px 12px; border-radius:8px; font-size:13px; cursor:pointer;
    font-family:var(--font-body);
  }

  /* ── VISOR PRINCIPAL ── */
  #viewer-wrap {
    position:fixed; top:52px; left:0; right:0; bottom:0;
    display:flex; flex-direction:column;
  }

  /* ── MODEL-VIEWER (3D + AR) ── */
  #mv-container {
    position:relative; flex:1; min-height:0; background:var(--bg);
    overflow:hidden;
  }
  model-viewer {
    width:100%; height:100%;
    background-color:transparent;
    --poster-color:transparent;
  }
  /* Botón AR nativo de model-viewer */
  model-viewer::part(default-ar-button) {
    bottom:90px !important; right:16px !important;
    background:var(--accent) !important; color:#0e0e13 !important;
    border-radius:50px !important; padding:12px 22px !important;
    font-family:var(--font-head) !important; font-weight:800 !important;
    border:none !important; font-size:15px !important;
    box-shadow:0 4px 20px rgba(200,240,61,0.5) !important;
  }
  /* Barra de progreso de carga del modelo */
  model-viewer::part(default-progress-bar) {
    background:var(--accent);
    height:3px;
  }

  /* Títulos flotantes */
  #tool-title-float {
    position:absolute; top:14px; left:16px;
    font-family:var(--font-head); font-size:22px; font-weight:800;
    text-shadow:0 2px 8px rgba(0,0,0,0.7); pointer-events:none;
  }
  #tool-cat-float {
    position:absolute; top:44px; left:16px;
    font-size:11px; font-weight:700; color:var(--accent);
    letter-spacing:1.5px; text-transform:uppercase;
    text-shadow:0 1px 4px rgba(0,0,0,0.8); pointer-events:none;
  }
  #model-fallback-tag {
    position:absolute; top:14px; right:16px;
    font-size:11px; color:var(--muted);
    background:rgba(0,0,0,0.5); padding:3px 8px; border-radius:20px;
    display:none; pointer-events:none;
  }

  /* Botón AR personalizado (respaldo si model-viewer no lo muestra) */
  #ar-btn {
    position:absolute; bottom:16px; right:16px;
    background:var(--accent); color:#0e0e13;
    border:none; border-radius:50px; padding:12px 22px;
    font-family:var(--font-head); font-size:14px; font-weight:800;
    cursor:pointer; display:none; z-index:10;
    box-shadow:0 4px 20px rgba(200,240,61,0.4);
    animation:arPulse 2s infinite;
  }
  @keyframes arPulse {
    0%,100%{box-shadow:0 4px 20px rgba(200,240,61,0.4);}
    50%{box-shadow:0 4px 30px rgba(200,240,61,0.8);}
  }

  /* ── LOADING / ERROR ── */
  #loading {
    position:absolute; inset:0; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
    z-index:50;
  }
  .spinner {
    width:40px; height:40px; border:3px solid var(--border);
    border-top-color:var(--accent); border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  #loading p { color:var(--muted); font-size:14px; }
  #error-state {
    position:absolute; inset:0; display:none;
    flex-direction:column; align-items:center; justify-content:center;
    gap:12px; text-align:center; padding:2rem;
  }
  #error-state.show { display:flex; }
  .err-icon { font-size:48px; opacity:0.4; }
  #error-state h2 { font-family:var(--font-head); font-size:22px; }
  #error-state p { color:var(--muted); font-size:14px; }

  /* ── BURBUJA DE VOZ ── */
  #speech-wrap {
    flex-shrink:0; background:var(--surface);
    border-top:1px solid var(--border); padding:12px 16px;
    position:relative; z-index:10; min-height:72px; max-height:140px;
    overflow-y:auto;
  }
  #voice-progress {
    position:absolute; top:0; left:0; height:2px;
    background:var(--accent); width:0; transition:width linear;
    border-radius:0 2px 2px 0;
  }
  #speech-inner { display:flex; gap:12px; align-items:flex-start; }
  #speech-avatar {
    width:36px; height:36px; border-radius:50%;
    background:var(--card); border:2px solid var(--accent);
    display:flex; align-items:center; justify-content:center;
    font-size:16px; flex-shrink:0; overflow:hidden;
  }
  #speech-avatar canvas { width:36px; height:36px; }
  #speech-text { font-size:14px; line-height:1.7; color:var(--text); padding-top:2px; }
  #typing-cursor {
    display:inline-block; width:2px; height:14px;
    background:var(--accent); margin-left:2px; vertical-align:middle;
    animation:blink 0.7s infinite;
  }
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

  /* ── PANEL INFO ── */
  #info-panel {
    display:none; position:fixed; inset:52px 0 0 0; z-index:200;
    background:rgba(8,8,15,0.97); padding:24px 20px; overflow-y:auto;
    flex-direction:column; gap:16px;
  }
  #info-panel.open { display:flex; }
  #info-panel h2 { font-family:var(--font-head); font-size:24px; font-weight:800; }
  #info-panel .cat { color:var(--accent); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
  #info-panel .desc { color:var(--muted); font-size:15px; line-height:1.8; }
  #info-close { position:absolute; top:16px; right:16px; background:var(--border); border:none; color:var(--text); width:36px; height:36px; border-radius:50%; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

  @keyframes pulse {
    0%,100%{box-shadow:0 0 0 0 rgba(200,240,61,0.5);}
    50%{box-shadow:0 0 0 8px rgba(200,240,61,0);}
  }

  /* Personaje 3D */
  #char-wrap {
    position:absolute; bottom:0; right:0; z-index:10;
    width:120px; height:200px; pointer-events:none;
  }
  #char-wrap model-viewer {
    pointer-events:none;
  }

  /* Botón AR flotante */
  #ar-fab {
    position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
    background:var(--accent); color:#0e0e13;
    border:none; border-radius:50px; padding:12px 24px;
    font-family:var(--font-head); font-size:15px; font-weight:800;
    cursor:pointer; z-index:20;
    box-shadow:0 4px 24px rgba(200,240,61,0.5);
    animation:pulse 2s infinite;
    white-space:nowrap;
  }
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">Taller<span>Scan</span></div>
  <div id="tool-badge">Cargando...</div>
  <button id="repeat-btn" onclick="repeatSpeech()">🔊 Repetir</button>
</div>

<div id="viewer-wrap">
  <div id="mv-container">

    <!-- Model-Viewer: maneja 3D y AR automáticamente -->
    <model-viewer
      id="main-mv"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-scale="auto"
      style="display:none;"
    ></model-viewer>

    <!-- Canvas Three.js (fallback cuando no hay GLB URL) -->
    <canvas id="three-canvas" style="display:none;"></canvas>

    <div id="tool-title-float"></div>
    <div id="tool-cat-float"></div>
    <div id="model-fallback-tag">Modelo procedural</div>
    <!-- Personaje 3D animado (GLB gratuito de ReadyPlayerMe/Mixamo) -->
  <div id="char-wrap">
    <model-viewer
      id="char-mv"
      src="https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb"
      alt="Asistente SENA"
      autoplay
      animation-name="idle"
      camera-controls="false"
      disable-zoom
      disable-pan
      style="width:120px;height:200px;background:transparent;--poster-color:transparent;"
    ></model-viewer>
  </div>

  <!-- Botón AR -->
  <button id="ar-fab" onclick="activarAR()" style="display:none;">
    📷 Ver en tu espacio
  </button>

    <div id="loading"><div class="spinner"></div><p>Cargando herramienta...</p></div>
    <div id="error-state">
      <div class="err-icon">🔍</div>
      <h2>Máquina no encontrada</h2>
      <p>Escanea un código QR válido del salón</p>
    </div>
  </div>

  <div id="speech-wrap">
    <div id="voice-progress"></div>
    <div id="speech-inner">
      <div id="speech-avatar">🤖</div>
      <div id="speech-text"><span id="text-out"></span><span id="typing-cursor"></span></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── PARAMS ──────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const machineId = params.get('id');
const isPreview = params.get('preview') === '1';

// ─── DEBUG PANEL (visible en pantalla para diagnóstico) ───────────────
function showDebug(msg) {
  console.log('[TallerScan]', msg);
}
const isDebug = false;

// ─── INDEXEDDB ───────────────────────────────────────────────────────
const DB_NAME='tallerscan_db', DB_VER=1, STORE_NAME='glb_store';
function openDB() {
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>e.target.result.createObjectStore(STORE_NAME);
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e.target.error);
  });
}
function dbGet(id) {
  return openDB().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(STORE_NAME,'readonly');
    const req=tx.objectStore(STORE_NAME).get('glb_'+id);
    req.onsuccess=e=>res(e.target.result||null);
    req.onerror=()=>res(null);
  }));
}

// ─── STORAGE ─────────────────────────────────────────────────────────
async function getMachineFromStorage(id) {
  // 1. localStorage del mismo PC (admin abierto en el mismo navegador)
  try {
    const raw = localStorage.getItem('tallerscan_meta');
    if(raw) {
      const meta = JSON.parse(raw);
      const m = meta.find(m => m.id === id);
      if(m) {
        if(m.hasGlb) { const glb = await dbGet(id); return {...m, glbData: glb}; }
        return {...m, glbData: null};
      }
    }
  } catch(e) {}

  // 2. data.json publicado en GitHub Pages (celular u otro dispositivo)
  const href = window.location.href.split('?')[0].split('#')[0];
  const viewerDir = href.substring(0, href.lastIndexOf('/') + 1);
  const dataUrl = viewerDir + 'data.json';

  showDebug('Buscando datos en: ' + dataUrl);

  try {
    const resp = await fetch(dataUrl + '?t=' + Date.now()); // evitar caché
    if(resp.ok) {
      const data = await resp.json();
      showDebug('data.json cargado ✅ — ' + data.length + ' máquinas. IDs: ' + data.map(x=>x.id).join(', '));
      const m = data.find(m => m.id === id);
      if(m) return {...m, glbData: null};
      showDebug('❌ ID "' + id + '" no encontrado en data.json');
    } else {
      showDebug('❌ data.json no encontrado (error ' + resp.status + ')');
    }
  } catch(e) {
    showDebug('❌ Error cargando data.json: ' + e.message);
  }

  return null;
}

// ─── THREE.JS (fallback procedural) ──────────────────────────────────
let scene,camera,renderer,toolGroup,animId,threeInitialized=false;
let isDragging=false,prevMouse={x:0,y:0};

function initThree() {
  if(threeInitialized) return;
  threeInitialized=true;
  const canvas=document.getElementById('three-canvas');
  const wrap=document.getElementById('mv-container');
  canvas.style.display='block';
  renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled=true;
  resizeRenderer();
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x08080f);
  scene.fog=new THREE.FogExp2(0x08080f,0.06);
  camera=new THREE.PerspectiveCamera(45,wrap.clientWidth/wrap.clientHeight,0.1,200);
  camera.position.set(0,1.8,5.5); camera.lookAt(0,0.5,0);
  scene.add(new THREE.AmbientLight(0xffffff,0.35));
  const d1=new THREE.DirectionalLight(0xffffff,0.9); d1.position.set(4,6,4); d1.castShadow=true; scene.add(d1);
  scene.add(new THREE.DirectionalLight(0x3de0f0,0.3).position.set(-4,2,-3));
  const acc=new THREE.PointLight(0xc8f03d,0.5,10); acc.position.set(0,3,2); scene.add(acc);
  scene.add(new THREE.GridHelper(20,30,0x1a1a28,0x111120));
  canvas.addEventListener('mousedown',e=>{isDragging=true;prevMouse={x:e.clientX,y:e.clientY};});
  window.addEventListener('mouseup',()=>isDragging=false);
  window.addEventListener('mousemove',e=>{if(!isDragging||!toolGroup)return;toolGroup.rotation.y+=(e.clientX-prevMouse.x)*0.012;prevMouse={x:e.clientX,y:e.clientY};});
  canvas.addEventListener('touchstart',e=>{isDragging=true;prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
  window.addEventListener('touchend',()=>isDragging=false);
  window.addEventListener('touchmove',e=>{if(!isDragging||!toolGroup)return;toolGroup.rotation.y+=(e.touches[0].clientX-prevMouse.x)*0.012;prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
  window.addEventListener('resize',resizeRenderer);
  (function loop(){animId=requestAnimationFrame(loop);if(toolGroup)toolGroup.rotation.y+=0.003;renderer.render(scene,camera);})();
}

function resizeRenderer(){
  if(!renderer)return;
  const wrap=document.getElementById('mv-container');
  renderer.setSize(wrap.clientWidth,wrap.clientHeight);
  if(camera){camera.aspect=wrap.clientWidth/wrap.clientHeight;camera.updateProjectionMatrix();}
}

function clearToolGroup(){if(toolGroup){scene.remove(toolGroup);toolGroup=null;}}

function buildProceduralModel(type,color){
  const g=new THREE.Group();
  const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(color||'#c8f03d'),roughness:0.4,metalness:0.3});
  if(type==='drill'){const b=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.5,2,16),mat);b.position.y=1;g.add(b);const h=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.15,1.5,8),mat);h.position.y=-0.25;g.add(h);}
  else{const b=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.8,1.2),mat);b.position.y=0.4;g.add(b);const p=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,1.5,16),mat);p.position.y=1.55;g.add(p);const base=new THREE.Mesh(new THREE.BoxGeometry(2,0.15,1.6),new THREE.MeshStandardMaterial({color:0x333344,roughness:0.8}));base.position.y=-0.075;g.add(base);}
  return g;
}

// ─── GLTF LOADER ─────────────────────────────────────────────────────
let gltfLoaderReady=false,gltfLoaderPromise=null;
function ensureGLTFLoader(){
  if(gltfLoaderReady)return Promise.resolve();
  if(gltfLoaderPromise)return gltfLoaderPromise;
  gltfLoaderPromise=new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
    s.onload=()=>{gltfLoaderReady=true;res();};
    s.onerror=rej;
    document.head.appendChild(s);
  });
  return gltfLoaderPromise;
}

function scaleGLTF(scene){
  const box=new THREE.Box3().setFromObject(scene);
  const size=box.getSize(new THREE.Vector3());
  const maxDim=Math.max(size.x,size.y,size.z);
  const sc=2.5/(maxDim||1);
  scene.scale.setScalar(sc);
  const ctr=box.getCenter(new THREE.Vector3());
  scene.position.sub(ctr.multiplyScalar(sc));
  scene.position.y+=0.5;
  return scene;
}

function loadGLBLocal(source){
  return ensureGLTFLoader().then(()=>new Promise((res,rej)=>{
    const loader=new THREE.GLTFLoader();
    if(source.startsWith('http')||source.startsWith('blob')){
      loader.load(source,g=>res(scaleGLTF(g.scene)),undefined,rej);
    } else {
      const byteStr=atob(source.split(',')[1]);
      const ab=new ArrayBuffer(byteStr.length);
      const ia=new Uint8Array(ab);
      for(let i=0;i<byteStr.length;i++)ia[i]=byteStr.charCodeAt(i);
      const blob=new Blob([ab],{type:'model/gltf-binary'});
      const url=URL.createObjectURL(blob);
      loader.load(url,g=>{URL.revokeObjectURL(url);res(scaleGLTF(g.scene));},undefined,rej);
    }
  }));
}

// ─── PERSONAJE 3D (model-viewer animado) ────────────────────────────
let isTalking = false;
let mouthInterval = null;

function initChar() {
  const mv = document.getElementById('char-mv');
  if(mv) {
    mv.addEventListener('load', () => {
      const anims = mv.availableAnimations;
      if(anims && anims.length > 0) {
        const idle = anims.find(a => /idle|stand|breath/i.test(a)) || anims[0];
        mv.animationName = idle;
        mv.play({repetitions: Infinity});
      }
    });
  }
}

function setTalkingAnim(talking) {
  isTalking = talking;
  const mv = document.getElementById('char-mv');
  if(!mv) return;
  try {
    const anims = mv.availableAnimations || [];
    if(talking) {
      const a = anims.find(x => /talk|speak|wave|gesture/i.test(x)) || anims[1] || anims[0];
      if(a) { mv.animationName = a; mv.play({repetitions: Infinity}); }
    } else {
      const a = anims.find(x => /idle|stand|breath/i.test(x)) || anims[0];
      if(a) { mv.animationName = a; mv.play({repetitions: Infinity}); }
    }
  } catch(e) {}
}

// ─── AR CON CÁMARA ───────────────────────────────────────────────────
function activarAR() {
  const mv = document.getElementById('main-mv');
  if(!mv || !mv.src) { toast('No hay modelo 3D cargado'); return; }

  // Android: Google Scene Viewer
  if(/android/i.test(navigator.userAgent)) {
    const url = `intent://arvr.google.com/scene-viewer/1.0?file=${encodeURIComponent(mv.src)}&mode=ar_preferred&title=${encodeURIComponent(document.getElementById('tool-title-float').textContent)}#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;S.browser_fallback_url=${encodeURIComponent(mv.src)};end;`;
    window.location.href = url;
    return;
  }
  // iOS: Quick Look
  if(/iphone|ipad|ipod/i.test(navigator.userAgent)) {
    const a = document.createElement('a');
    a.href = mv.src; a.rel = 'ar';
    a.appendChild(document.createElement('img'));
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    return;
  }
  alert('La Realidad Aumentada está disponible en Android Chrome o iPhone Safari');
}

// ─── VOZ ─────────────────────────────────────────────────────────────
let utterance=null,currentDesc='',pendingSpeech=null,voicesReady=false;

function doSpeak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  if(mouthInterval)clearInterval(mouthInterval);
  utterance=new SpeechSynthesisUtterance(text);
  utterance.lang='es-CO';utterance.rate=0.90;utterance.pitch=1.05;
  const voices=window.speechSynthesis.getVoices();
  const esVoice=voices.find(v=>v.lang==='es-CO')||voices.find(v=>v.lang==='es-US')||voices.find(v=>v.lang.startsWith('es')&&v.name.toLowerCase().includes('google'))||voices.find(v=>v.lang.startsWith('es'));
  if(esVoice)utterance.voice=esVoice;
  utterance.onstart=()=>{setTalkingAnim(true);animateProgress(text.length*65);};
  utterance.onend=()=>{setTalkingAnim(false);document.getElementById('typing-cursor').style.display='none';document.getElementById('voice-progress').style.width='100%';};
  utterance.onerror=(e)=>{setTalkingAnim(false);if(e.error==='not-allowed'||e.error==='interrupted'){document.getElementById('repeat-btn').style.animation='pulse 1s infinite';}};
  window.speechSynthesis.speak(utterance);
  typeText(text);
}

function speak(text){
  if(!window.speechSynthesis)return;
  pendingSpeech=text;
  const voices=window.speechSynthesis.getVoices();
  if(voices.length>0){voicesReady=true;doSpeak(text);}
  else{
    window.speechSynthesis.onvoiceschanged=()=>{voicesReady=true;window.speechSynthesis.onvoiceschanged=null;if(pendingSpeech){doSpeak(pendingSpeech);pendingSpeech=null;}};
    setTimeout(()=>{if(!voicesReady&&pendingSpeech){voicesReady=true;doSpeak(pendingSpeech);pendingSpeech=null;}},1500);
  }
}

function animateProgress(duration){
  const bar=document.getElementById('voice-progress');
  bar.style.width='0%';bar.style.transition=`width ${duration}ms linear`;
  setTimeout(()=>bar.style.width='95%',50);
}

let typingTimer=null;
function typeText(text){
  const el=document.getElementById('text-out');
  const cur=document.getElementById('typing-cursor');
  cur.style.display='inline-block';el.textContent='';
  if(typingTimer)clearInterval(typingTimer);
  let i=0;
  typingTimer=setInterval(()=>{if(i<text.length){el.textContent+=text[i];i++;}else clearInterval(typingTimer);},28);
}

function repeatSpeech(){if(currentDesc)speak(currentDesc);}

// ─── CARGA DE MÁQUINA ────────────────────────────────────────────────
let loadToken=0;

async function loadMachine(machine){
  const myToken=++loadToken;
  document.getElementById('loading').style.display='flex';
  document.getElementById('model-fallback-tag').style.display='none';

  document.getElementById('tool-badge').textContent=machine.cat||'HERRAMIENTA';
  document.getElementById('tool-title-float').textContent=machine.name;
  document.getElementById('tool-cat-float').textContent=machine.cat;
  document.title=machine.name+' — TallerScan';
  currentDesc=machine.desc;

  const glbSource = machine.glbUrl || machine.glbData || null;
  const mv = document.getElementById('main-mv');

  if(glbSource) {
    // ── model-viewer: 3D interactivo + botón AR automático ──
    mv.style.display = 'block';
    document.getElementById('three-canvas').style.display = 'none';
    document.getElementById('model-fallback-tag').style.display = 'none';

    mv.setAttribute('camera-controls', '');
    mv.setAttribute('auto-rotate', '');
    mv.setAttribute('ar', '');
    mv.setAttribute('ar-modes', 'webxr scene-viewer quick-look');
    mv.setAttribute('shadow-intensity', '1');

    if(glbSource.startsWith('data:')) {
      // dataURL local → blob URL para model-viewer
      try {
        const byteStr = atob(glbSource.split(',')[1]);
        const ab = new ArrayBuffer(byteStr.length);
        const ia = new Uint8Array(ab);
        for(let i=0;i<byteStr.length;i++) ia[i]=byteStr.charCodeAt(i);
        const blob = new Blob([ab], {type:'model/gltf-binary'});
        mv.src = URL.createObjectURL(blob);
      } catch(e) { mv.src = glbSource; }
    } else {
      mv.src = glbSource;
    }

    await new Promise(res=>{
      mv.addEventListener('load', res, {once:true});
      mv.addEventListener('error', ()=>{
        // Si falla, mostrar procedural
        mv.style.display='none';
        document.getElementById('three-canvas').style.display='block';
        document.getElementById('model-fallback-tag').style.display='block';
        initThree();
        if(toolGroup){scene.remove(toolGroup);toolGroup=null;}
        toolGroup=buildProceduralModel('default',machine.color);
        scene.add(toolGroup);
        res();
      }, {once:true});
      setTimeout(res, 8000);
    });

  } else {
    // ── Fallback Three.js procedural (sin glb) ──
    mv.style.display = 'none';
    document.getElementById('three-canvas').style.display = 'block';
    document.getElementById('model-fallback-tag').style.display = 'block';
    initThree();
    if(toolGroup){scene.remove(toolGroup);toolGroup=null;}
    const cat=(machine.cat||'').toLowerCase();
    let type = cat.includes('perfor')||cat.includes('drill') ? 'drill' : 'default';
    toolGroup = buildProceduralModel(type, machine.color);
    scene.add(toolGroup);
  }

  if(myToken!==loadToken)return;
  document.getElementById('loading').style.display='none';
  initChar();

  // Mostrar botón AR solo si hay un modelo con URL (no procedural)
  const arBtn = document.getElementById('ar-fab');
  const mv = document.getElementById('main-mv');
  if(arBtn && mv && mv.src && (machine.glbUrl || machine.glbData)) {
    arBtn.style.display = 'block';
  } else if(arBtn) {
    arBtn.style.display = 'none';
  }

  setTimeout(()=>{ speak(machine.desc); },1800);
}

// ─── INIT ─────────────────────────────────────────────────────────────
function init(){
  window.addEventListener('message',e=>{
    if(e.data?.type==='MACHINE_DATA')loadMachine(e.data.machine);
    if(e.data?.type==='REQUEST_MACHINE'&&e.data.id){
      getMachineFromStorage(e.data.id).then(m=>{if(m)window.parent.postMessage({type:'MACHINE_DATA',machine:m},'*');});
    }
  });

  if(machineId){
    if(isPreview&&window.parent!==window){
      document.getElementById('loading').style.display='flex';
      window.parent.postMessage({type:'REQUEST_MACHINE',id:machineId},'*');
    } else {
      getMachineFromStorage(machineId).then(m=>{
        if(m){loadMachine(m);}
        else{document.getElementById('loading').style.display='none';document.getElementById('error-state').classList.add('show');}
      });
    }
  } else if(!isPreview){
    document.getElementById('loading').style.display='none';
    document.getElementById('error-state').classList.add('show');
  }

  if(window.speechSynthesis)window.speechSynthesis.getVoices();

}

init();
</script>
